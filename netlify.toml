# Netlify build config
# index.html is pre-built locally (single-file React app with all assets inlined).
# Netlify just serves it — no build step needed.
#
# Firebase web config values are intentionally present in index.html.
# They are public-facing client keys protected by Firebase Security Rules,
# not server-side secrets. We tell Netlify's scanner to skip them.

[build]
  command = "echo 'Using pre-built index.html — no build needed'"
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "FIREBASE_API_KEY,FIREBASE_APP_ID,FIREBASE_AUTH_DOMAIN,FIREBASE_MEASUREMENT_ID,FIREBASE_MESSAGING_SENDER_ID,FIREBASE_PROJECT_ID,FIREBASE_STORAGE_BUCKET"
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

# SPA routing — all paths serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
